<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; background: #121212; color: #E0E0E0; font-family: sans-serif; padding: 15px; }
    h3 { color: #0072CE; margin: 0 0 10px 0; }
    textarea { width: 100%; height: 60px; background: #1E1E1E; border: 1px solid #333; color: white; padding: 5px; }
    button { width: 100%; background: #0072CE; padding: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    #status { margin-top: 10px; color: #888; font-size: 12px; }
    body.ups-mode { background-color: #001c41; color: white; transition: 0.3s; }
body.gan-mode { background-color: #2c2c2c; color: #f0f0f0; transition: 0.3s; }

.header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); }
/* Add standard toggle switch CSS here */
  </style>
</head>
<body>
  <h3 align="center" font face="Times New Roman, sans-serif">CUZOR AI</h3>
  <textarea id="hintInput" placeholder="Enter your suggestion..."></textarea>
  <button id="genBtn">GENERATE</button>
  <div id="status">Ready.</div>
<body id="mainBody" class="ups-mode">
  <div class="header">
    <span id="modeLabel">MiniUPS Mode</span>
    <label class="switch">
      <input type="checkbox" id="modeToggle">
      <span class="slider"></span>
    </label>
  </div>
  </body>
  </body>  
  <script src="popup.js"></script>

</html>
